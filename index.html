<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKYVERSE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050508;
            --accent: #00d2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- STARTUP ANIMATION --- */
        #splash {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        #splash h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 3rem;
            letter-spacing: 15px;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            animation: pulse 2s infinite alternate;
        }
        @keyframes pulse {
            from { opacity: 0.3; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- LAYOUT --- */
        #app {
            display: none; /* Shown after animation */
            padding-bottom: 120px;
        }

        header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,210,255,0.1), transparent);
        }

        .logo { font-family: 'Syncopate'; font-weight: 700; color: var(--accent); }

        /* --- SEARCH & TABS --- */
        .search-container { padding: 0 20px; margin-bottom: 20px; }
        input[type="text"] {
            width: 100%; padding: 12px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white;
        }

        /* --- LIBRARY GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px; padding: 20px;
        }
        .album-card {
            background: var(--glass);
            padding: 10px; border-radius: 12px;
            text-align: center; cursor: pointer;
            transition: 0.3s;
        }
        .album-card:hover { background: rgba(255,255,255,0.1); }
        .album-card img { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; }
        .album-card h4 { margin: 10px 0 5px; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-card p { font-size: 0.7rem; opacity: 0.6; }

        /* --- PLAYER BAR (iOS Optimized) --- */
        #player-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px 20px;
            display: flex; align-items: center;
            z-index: 1000;
        }
        .now-playing-info { display: flex; align-items: center; flex: 1; }
        .now-playing-info img { width: 50px; height: 50px; border-radius: 4px; margin-right: 15px; }
        .controls { display: flex; gap: 20px; align-items: center; }
        button { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        #play-btn { font-size: 2.2rem; color: var(--accent); }

        /* --- UPLOADER MODAL --- */
        #upload-zone {
            padding: 20px; border: 2px dashed var(--accent);
            margin: 20px; border-radius: 12px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="splash">
        <h1>SKYVERSE</h1>
        <p style="letter-spacing: 3px; font-size: 0.7rem; opacity: 0.5;">INITIALIZING DATABASE...</p>
    </div>

    <div id="app">
        <header>
            <div class="logo">SKYVERSE</div>
            <button onclick="document.getElementById('file-input').click()">+ UPLOAD</button>
            <input type="file" id="file-input" multiple accept="audio/*" style="display:none">
        </header>

        <div class="search-container">
            <input type="text" id="search" placeholder="Search tracks, artists, albums...">
        </div>

        <div id="library-title" style="padding: 0 20px; font-weight: bold; font-size: 1.2rem;">My Library</div>
        <div class="grid" id="music-grid">
            </div>

        <audio id="audio-player"></audio>

        <div id="player-bar">
            <div class="now-playing-info">
                <img id="current-art" src="https://via.placeholder.com/150">
                <div>
                    <div id="current-title" style="font-weight: 500;">Nothing Playing</div>
                    <div id="current-artist" style="font-size: 0.8rem; opacity: 0.6;">Select a track</div>
                </div>
            </div>
            <div class="controls">
                <button onclick="playPrev()">⏮</button>
                <button id="play-btn" onclick="togglePlay()">▶</button>
                <button onclick="playNext()">⏭</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SB_URL = "YOUR_SUPABASE_URL";
        const SB_KEY = "YOUR_SUPABASE_ANON_KEY";
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentPlaylist = [];
        let currentIndex = -1;
        const audio = document.getElementById('audio-player');

        // --- 2. STARTUP ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    loadLibrary();
                }, 1000);
            }, 2500);
        });

        // --- 3. METADATA & UPLOAD ---
        document.getElementById('file-input').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            alert(`Processing ${files.length} tracks... Please wait.`);

            for (const file of files) {
                jsmediatags.read(file, {
                    onSuccess: async (tag) => {
                        const metadata = tag.tags;
                        let coverUrl = "https://via.placeholder.com/300";

                        // Handle Album Art
                        if (metadata.picture) {
                            const { data, type } = metadata.picture;
                            const blob = new Blob([new Uint8Array(data)], { type });
                            const artName = `${Date.now()}-art.png`;
                            await supabase.storage.from('covers').upload(artName, blob);
                            coverUrl = supabase.storage.from('covers').getPublicUrl(artName).data.publicUrl;
                        }

                        // Upload Audio
                        const audioName = `${Date.now()}-${file.name}`;
                        await supabase.storage.from('music').upload(audioName, file);
                        const audioUrl = supabase.storage.from('music').getPublicUrl(audioName).data.publicUrl;

                        // Save to Database
                        await supabase.from('songs').insert([{
                            title: metadata.title || file.name,
                            artist: metadata.artist || "Unknown Artist",
                            album: metadata.album || "Unknown Album",
                            year: metadata.year || null,
                            duration: "", // Optional: calculate duration
                            audio_url: audioUrl,
                            cover_url: coverUrl
                        }]);

                        loadLibrary();
                    },
                    onError: (error) => console.log('Error reading tags:', error)
                });
            }
        });

        // --- 4. LIBRARY LOADING ---
        async function loadLibrary() {
            const { data: songs } = await supabase.from('songs').select('*').order('created_at', { ascending: false });
            currentPlaylist = songs;
            renderGrid(songs);
        }

        function renderGrid(songs) {
            const grid = document.getElementById('music-grid');
            grid.innerHTML = songs.map((song, index) => `
                <div class="album-card" onclick="playSong(${index})">
                    <img src="${song.cover_url}">
                    <h4>${song.title}</h4>
                    <p>${song.artist} • ${song.album}</p>
                </div>
            `).join('');
        }

        // --- 5. PLAYER LOGIC ---
        function playSong(index) {
            currentIndex = index;
            const song = currentPlaylist[index];
            
            audio.src = song.audio_url;
            audio.play();
            
            document.getElementById('current-art').src = song.cover_url;
            document.getElementById('current-title').innerText = song.title;
            document.getElementById('current-artist').innerText = song.artist;
            document.getElementById('play-btn').innerText = "⏸";

            // iOS Background & Lock Screen Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaSessionMetadata({
                    title: song.title,
                    artist: song.artist,
                    album: song.album,
                    artwork: [{ src: song.cover_url, sizes: '512x512', type: 'image/png' }]
                });

                navigator.mediaSession.setActionHandler('play', () => { audio.play(); });
                navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
                navigator.mediaSession.setActionHandler('previoustrack', playPrev);
                navigator.mediaSession.setActionHandler('nexttrack', playNext);
            }
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                document.getElementById('play-btn').innerText = "⏸";
            } else {
                audio.pause();
                document.getElementById('play-btn').innerText = "▶";
            }
        }

        function playNext() {
            if (currentIndex < currentPlaylist.length - 1) playSong(currentIndex + 1);
        }

        function playPrev() {
            if (currentIndex > 0) playSong(currentIndex - 1);
        }

        // --- 6. SEARCH ---
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = currentPlaylist.filter(s => 
                s.title.toLowerCase().includes(term) || 
                s.artist.toLowerCase().includes(term) || 
                s.album.toLowerCase().includes(term)
            );
            renderGrid(filtered);
        });
    </script>
</body>
</html>
